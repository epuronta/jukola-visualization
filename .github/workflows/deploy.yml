name: Deploy site

# Build the static pages from the committed result XMLs and publish to
# GitHub Pages. Generated HTML is no longer committed; it is built here.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer push supersede an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Self-configure Pages to the workflow build type so no manual repo
      # setting is needed (switches an existing legacy source on first run).
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build pages
        run: |
          make all RELAY=jukola YEAR=2026
          make all RELAY=venla YEAR=2026
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
